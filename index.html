<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumpsum Investment Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f1eb;
      --surface: #ffffff;
      --surface2: #f9f7f2;
      --border: #e2ddd5;
      --accent: #1a3a5c;
      --accent2: #2e6fad;
      --positive: #1a6b3c;
      --positive-bg: #eaf5ee;
      --text: #1c1c1c;
      --muted: #6b6660;
      --label: #3d3a36;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      max-width: 780px;
      margin: 0 auto 2rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--accent);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    header h1 span { color: var(--accent2); }

    header p {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 0.5rem;
      font-weight: 300;
    }

    .layout {
      max-width: 780px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title svg { flex-shrink: 0; }

    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--label);
      margin-bottom: 0.35rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .prefix {
      position: absolute;
      left: 0.9rem;
      font-size: 0.9rem;
      color: var(--muted);
      pointer-events: none;
    }

    .input-wrap .suffix {
      position: absolute;
      right: 0.9rem;
      font-size: 0.85rem;
      color: var(--muted);
      pointer-events: none;
    }

    input[type="number"], select {
      width: 100%;
      padding: 0.65rem 2.5rem 0.65rem 2rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--surface2);
      color: var(--text);
      transition: border 0.2s, background 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus, select:focus {
      outline: none;
      border-color: var(--accent2);
      background: #fff;
    }

    select { padding: 0.65rem 2.5rem 0.65rem 0.9rem; appearance: none; cursor: pointer; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '';
      position: absolute;
      right: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-top-color: var(--muted);
      pointer-events: none;
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .slider-wrap { margin-top: 0.4rem; }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--accent2) 0%, var(--accent2) var(--pct, 50%), var(--border) var(--pct, 50%));
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent2);
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .result-card {
      background: var(--accent);
      border-radius: var(--radius);
      padding: 1.5rem;
      color: white;
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .result-card::after {
      content: '';
      position: absolute;
      bottom: -80px; left: 20px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .metric { position: relative; z-index: 1; }
    .metric .m-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.65;
      margin-bottom: 0.3rem;
    }
    .metric .m-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      line-height: 1.1;
    }
    .metric .m-sub { font-size: 0.78rem; opacity: 0.6; margin-top: 0.2rem; }

    .gain-pill {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 0.2rem 0.7rem;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .breakdown {
      grid-column: 1 / -1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead tr { border-bottom: 2px solid var(--border); }
    thead th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      font-weight: 500;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 0.55rem 0.75rem; }
    tbody td:last-child { text-align: right; font-weight: 500; color: var(--positive); }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .s-label { color: var(--muted); }
    .summary-row .s-val { font-weight: 500; }

    .bar-chart { margin-top: 1rem; }
    .bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .bar-label { font-size: 0.78rem; color: var(--muted); width: 100px; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .bar-val { font-size: 0.78rem; font-weight: 500; width: 80px; text-align: right; flex-shrink: 0; }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.18s;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    button:hover { background: var(--accent); color: white; border-color: var(--accent); }
    button.primary { background: var(--accent2); color: white; border-color: var(--accent2); }
    button.primary:hover { background: var(--accent); border-color: var(--accent); }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .mode-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .mode-btn {
      flex: 1;
      padding: 0.45rem 0.5rem;
      font-size: 0.78rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      text-align: center;
    }
    .mode-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
  </style>
</head>
<body>

<header>
  <h1>Lumpsum <span>Calculator</span></h1>
  <p>Estimate the future value of a one-time investment with compound growth.</p>
</header>

<div class="layout">

  <!-- Inputs -->
  <div class="card">
    <div class="card-title">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Inputs
    </div>

    <div class="field">
      <label>Solve for</label>
      <div class="select-wrap">
        <select id="solveFor" onchange="updateMode()">
          <option value="finalBalance">Final balance</option>
          <option value="initialLumpsum">Initial lumpsum</option>
          <option value="requiredPeriod">Required period</option>
          <option value="requiredRate">Required rate of return</option>
        </select>
      </div>
    </div>

    <div class="field" id="f-principal">
      <label>Initial Lumpsum (₹)</label>
      <div class="input-wrap">
        <span class="prefix">₹</span>
        <input type="number" id="principal" value="100000" min="1" oninput="compute()"/>
      </div>
    </div>

    <div class="field" id="f-rate">
      <label>Expected Rate of Return</label>
      <div class="input-wrap">
        <input type="number" id="rate" value="8.8" step="0.1" min="0" max="100" oninput="syncSlider();compute()"/>
        <span class="suffix">%</span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="rateSlider" min="1" max="30" step="0.1" value="8.8" oninput="syncRate()"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field" id="f-term">
        <label>Term</label>
        <div class="input-wrap">
          <input type="number" id="term" value="10" min="1" oninput="compute()"/>
        </div>
      </div>
      <div class="field">
        <label>Unit</label>
        <div class="select-wrap">
          <select id="termUnit" onchange="compute()">
            <option value="years">Years</option>
            <option value="months">Months</option>
          </select>
        </div>
      </div>
    </div>

    <div class="field" id="f-target">
      <label>Target Amount (₹)</label>
      <div class="input-wrap">
        <span class="prefix">₹</span>
        <input type="number" id="target" value="250000" min="1" oninput="compute()"/>
      </div>
    </div>

    <div class="field">
      <label>Inflation Rate</label>
      <div class="input-wrap">
        <input type="number" id="inflation" value="0" step="0.1" min="0" max="30" oninput="compute()"/>
        <span class="suffix">%</span>
      </div>
    </div>

    <div class="field">
      <label>Compounding Frequency</label>
      <div class="select-wrap">
        <select id="freq" onchange="compute()">
          <option value="continuous">Continuous</option>
          <option value="1">Yearly</option>
          <option value="2">Semi-annually</option>
          <option value="4">Quarterly</option>
          <option value="12">Monthly</option>
          <option value="26">Biweekly</option>
          <option value="52">Weekly</option>
          <option value="365">Daily</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Results Summary -->
  <div class="card">
    <div class="card-title">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      Results
    </div>

    <div id="summaryRows"></div>

    <div class="bar-chart" id="barChart"></div>
  </div>

  <!-- Big result card -->
  <div class="result-card" id="resultCard">
    <div class="metric">
      <div class="m-label" id="mainLabel">Final Balance</div>
      <div class="m-value" id="mainValue">₹0</div>
      <div class="m-sub" id="mainSub"></div>
    </div>
    <div class="metric">
      <div class="m-label">Total Return</div>
      <div class="m-value" id="returnValue">₹0</div>
      <div class="gain-pill" id="returnPct">+0%</div>
    </div>
    <div class="metric">
      <div class="m-label" id="realLabel">Real Value (inflation adj.)</div>
      <div class="m-value" id="realValue">₹0</div>
      <div class="m-sub" id="realSub"></div>
    </div>
  </div>

  <!-- Year-by-year table -->
  <div class="card breakdown">
    <div class="card-title">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Year-by-Year Growth
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Year</th>
            <th>Opening Balance</th>
            <th>Interest Earned</th>
            <th>Closing Balance</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="primary" onclick="copyResult()">⎘ Copy Result</button>
    <button onclick="resetForm()">↺ Reset</button>
    <button onclick="downloadCSV()">↓ Export CSV</button>
  </div>

</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
  let tableData = [];

  function fmt(n) {
    return '₹' + Math.round(n).toLocaleString('en-IN');
  }

  function fmtN(n, dec=2) {
    return parseFloat(n.toFixed(dec));
  }

  function syncSlider() {
    const r = parseFloat(document.getElementById('rate').value) || 0;
    const slider = document.getElementById('rateSlider');
    slider.value = Math.min(r, 30);
    const pct = ((r - 1) / 29) * 100;
    slider.style.setProperty('--pct', Math.max(0, Math.min(100, pct)) + '%');
  }

  function syncRate() {
    const val = document.getElementById('rateSlider').value;
    document.getElementById('rate').value = val;
    const pct = ((val - 1) / 29) * 100;
    document.getElementById('rateSlider').style.setProperty('--pct', pct + '%');
    compute();
  }

  function updateMode() {
    const mode = document.getElementById('solveFor').value;
    document.getElementById('f-principal').style.display = mode === 'initialLumpsum' ? 'none' : '';
    document.getElementById('f-rate').style.display = mode === 'requiredRate' ? 'none' : '';
    document.getElementById('f-term').style.display = mode === 'requiredPeriod' ? 'none' : '';
    document.getElementById('f-target').style.display = ['initialLumpsum','requiredPeriod','requiredRate'].includes(mode) ? '' : 'none';
    compute();
  }

  function getFreqN() {
    const v = document.getElementById('freq').value;
    return v === 'continuous' ? 'continuous' : parseInt(v);
  }

  function compound(P, r, n, t) {
    if (n === 'continuous') return P * Math.exp(r * t);
    return P * Math.pow(1 + r / n, n * t);
  }

  function compute() {
    const mode = document.getElementById('solveFor').value;
    const P = parseFloat(document.getElementById('principal').value) || 0;
    const r = (parseFloat(document.getElementById('rate').value) || 0) / 100;
    const rawTerm = parseFloat(document.getElementById('term').value) || 1;
    const unit = document.getElementById('termUnit').value;
    const t = unit === 'months' ? rawTerm / 12 : rawTerm;
    const inflation = (parseFloat(document.getElementById('inflation').value) || 0) / 100;
    const n = getFreqN();
    const target = parseFloat(document.getElementById('target').value) || 0;

    let result, label, sub;

    if (mode === 'finalBalance') {
      result = compound(P, r, n, t);
      label = 'Final Balance';
      sub = `After ${fmtN(t,1)} year${t!==1?'s':''}`;
      showResult(P, result, r, t, inflation, n, label, sub, fmt(result));
    } else if (mode === 'initialLumpsum') {
      result = target / (n === 'continuous' ? Math.exp(r*t) : Math.pow(1 + r/n, n*t));
      label = 'Required Initial Investment';
      sub = `To reach ${fmt(target)}`;
      showResult(result, target, r, t, inflation, n, label, sub, fmt(result));
    } else if (mode === 'requiredPeriod') {
      const ratio = target / P;
      let years;
      if (n === 'continuous') years = Math.log(ratio) / r;
      else years = Math.log(ratio) / (n * Math.log(1 + r/n));
      result = years;
      label = 'Required Period';
      const displayT = unit === 'months' ? fmtN(years * 12, 1) + ' months' : fmtN(years, 2) + ' years';
      sub = `To grow ${fmt(P)} → ${fmt(target)}`;
      showResult(P, target, r, years, inflation, n, label, sub, displayT, true);
    } else if (mode === 'requiredRate') {
      const tYears = t;
      let rr;
      if (n === 'continuous') rr = Math.log(target / P) / tYears;
      else rr = n * (Math.pow(target / P, 1/(n*tYears)) - 1);
      result = rr * 100;
      label = 'Required Rate of Return';
      sub = `To grow ${fmt(P)} → ${fmt(target)}`;
      showResult(P, target, rr, t, inflation, n, label, sub, fmtN(result,2) + '%', true);
    }

    syncSlider();
  }

  function showResult(P, FV, r, t, inflation, n, label, sub, mainDisplay, noTable=false) {
    const gain = FV - P;
    const pct = P > 0 ? ((gain / P) * 100).toFixed(2) : '0';
    const realFV = FV / Math.pow(1 + inflation, t);

    document.getElementById('mainLabel').textContent = label;
    document.getElementById('mainValue').textContent = mainDisplay;
    document.getElementById('mainSub').textContent = sub;
    document.getElementById('returnValue').textContent = fmt(gain);
    document.getElementById('returnPct').textContent = (gain >= 0 ? '+' : '') + pct + '%';
    document.getElementById('realValue').textContent = fmt(realFV);
    document.getElementById('realSub').textContent = inflation > 0 ? `Adj. for ${(inflation*100).toFixed(1)}% inflation` : 'No inflation adjustment';

    // Summary
    const summaryEl = document.getElementById('summaryRows');
    summaryEl.innerHTML = `
      <div class="summary-row"><span class="s-label">Opening balance</span><span class="s-val">${fmt(P)}</span></div>
      <div class="summary-row"><span class="s-label">Final balance</span><span class="s-val">${fmt(FV)}</span></div>
      <div class="summary-row"><span class="s-label">Total interest</span><span class="s-val">${fmt(gain)}</span></div>
      <div class="summary-row"><span class="s-label">End of term</span><span class="s-val">${getEndDate(t)}</span></div>
    `;

    // Bar chart
    const total = FV;
    document.getElementById('barChart').innerHTML = `
      <div class="bar-row">
        <div class="bar-label">Principal</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(P/total)*100).toFixed(1)}%;background:#1a3a5c;"></div></div>
        <div class="bar-val">${fmt(P)}</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">Returns</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,(gain/total)*100).toFixed(1)}%;background:#2e6fad;"></div></div>
        <div class="bar-val">${fmt(gain)}</div>
      </div>
    `;

    // Table
    if (!noTable) {
      buildTable(P, r, n, Math.ceil(t));
    } else {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" style="color:var(--muted);padding:1rem 0.75rem;font-size:0.85rem;">Table available in Final Balance mode.</td></tr>';
    }
  }

  function buildTable(P, r, n, years) {
    tableData = [];
    let balance = P;
    let rows = '';
    const maxRows = Math.min(years, 50);
    for (let y = 1; y <= maxRows; y++) {
      const newBalance = compound(P, r, n, y);
      const interest = newBalance - balance;
      tableData.push({ year: y, open: balance, interest, close: newBalance });
      rows += `<tr>
        <td>Year ${y}</td>
        <td>${fmt(balance)}</td>
        <td>${fmt(interest)}</td>
        <td>${fmt(newBalance)}</td>
      </tr>`;
      balance = newBalance;
    }
    if (years > 50) rows += `<tr><td colspan="4" style="color:var(--muted);font-size:0.82rem;padding:0.5rem 0.75rem;">Showing first 50 years…</td></tr>`;
    document.getElementById('tableBody').innerHTML = rows;
  }

  function getEndDate(years) {
    const d = new Date();
    d.setFullYear(d.getFullYear() + Math.round(years));
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function copyResult() {
    const main = document.getElementById('mainValue').textContent;
    const ret = document.getElementById('returnValue').textContent;
    const text = `${document.getElementById('mainLabel').textContent}: ${main}\nTotal Return: ${ret}`;
    navigator.clipboard.writeText(text).then(showToast).catch(() => showToast('Copied!'));
  }

  function showToast(msg='Copied to clipboard!') {
    const t = document.getElementById('toast');
    t.textContent = typeof msg === 'string' ? msg : 'Copied!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function resetForm() {
    document.getElementById('principal').value = 100000;
    document.getElementById('rate').value = 8.8;
    document.getElementById('term').value = 10;
    document.getElementById('termUnit').value = 'years';
    document.getElementById('inflation').value = 0;
    document.getElementById('freq').value = 'continuous';
    document.getElementById('solveFor').value = 'finalBalance';
    document.getElementById('target').value = 250000;
    updateMode();
    syncSlider();
  }

  function downloadCSV() {
    if (!tableData.length) return;
    let csv = 'Year,Opening Balance,Interest Earned,Closing Balance\n';
    tableData.forEach(r => {
      csv += `${r.year},${Math.round(r.open)},${Math.round(r.interest)},${Math.round(r.close)}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'lumpsum-projection.csv';
    a.click();
    showToast('CSV downloaded!');
  }

  // Init
  updateMode();
  syncSlider();
</script>
</body>
</html>
